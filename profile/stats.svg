<svg width="335" height="195" viewBox="0 0 335 195" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="descId">
  <title id="titleId">Kawser Ahmad GitHub Stats, Rank: C+</title>
  <desc id="descId">Total Stars Earned: 21, Total Commits (last year): 363, Total PRs: 0, Total Issues: 0, Contributed to (last year): 0</desc>
  <defs>
    <linearGradient id="stats-bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#fff8fb;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="stats-title-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f093fb;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f5576c;stop-opacity:1" />
    </linearGradient>
    <filter id="stats-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000000" flood-opacity="0.08" />
    </filter>
  </defs>
  <style>
    .header { font: 600 18px 'Segoe UI', Ubuntu, Sans-Serif; fill: url(#stats-title-grad); animation: fadeInAnimation 0.8s ease-in-out forwards; }
    .stat { font: 600 14px 'Segoe UI', Ubuntu, Sans-Serif; fill: #475569; }
    .rank-text { font: 800 24px 'Segoe UI', Ubuntu, Sans-Serif; fill: #475569; animation: scaleInAnimation 0.3s ease-in-out forwards; }
    .stagger { opacity: 0; animation: fadeInAnimation 0.3s ease-in-out forwards; }
    @keyframes fadeInAnimation { from { opacity: 0; } to { opacity: 1; } }
    @keyframes scaleInAnimation { from { transform: translate(-5px, 5px) scale(0); } to { transform: translate(-5px, 5px) scale(1); } }
  </style>
  <rect data-testid="card-bg" x="0.5" y="0.5" rx="12" height="99%" stroke="#ffe8f0" width="334" fill="url(#stats-bg-grad)" stroke-opacity="1" filter="url(#stats-shadow)" />
  <g data-testid="card-title" transform="translate(25, 35)">
    <text x="0" y="0" class="header" data-testid="header">GitHub Stats</text>
  </g>
  <g data-testid="main-card-body" transform="translate(25, 60)">
    <g transform="translate(0, 0)" class="stagger" style="animation-delay: 450ms">
      <text data-testid="stat-icon" x="0" y="13" class="stat">⭐</text>
      <text data-testid="stat-text" x="25" y="15" class="stat">21 Stars</text>
    </g>
    <g transform="translate(150, 0)" class="stagger" style="animation-delay: 600ms">
      <text data-testid="stat-icon" x="0" y="13" class="stat">📝</text>
      <text data-testid="stat-text" x="25" y="15" class="stat">363 Commits</text>
    </g>
    <g transform="translate(0, 40)" class="stagger" style="animation-delay: 750ms">
      <text data-testid="stat-icon" x="0" y="13" class="stat">🚀</text>
      <text data-testid="stat-text" x="25" y="15" class="stat">0 PRs</text>
    </g>
    <g transform="translate(150, 40)" class="stagger" style="animation-delay: 900ms">
      <text data-testid="stat-icon" x="0" y="13" class="stat">❓</text>
      <text data-testid="stat-text" x="25" y="15" class="stat">0 Issues</text>
    </g>
  </g>
  <g transform="translate(275, 60)" class="stagger" style="animation-delay: 1050ms">
    <circle cx="15" cy="35" r="28" fill="none" stroke="#1f2937" stroke-width="2" opacity="0.3" />
    <text data-testid="rank-text" x="0" y="48" text-anchor="middle" class="rank-text">C+</text>
  </g>
</svg>
