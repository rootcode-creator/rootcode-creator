<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512" role="img" aria-label="HackerRank-style logo in purple rounded square">
  <defs>
    <linearGradient id="grad" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#7b2fff"/>
      <stop offset="100%" stop-color="#4a00d6"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="18" flood-color="#000" flood-opacity="0.18"/>
    </filter>
  </defs>

  <!-- Rounded square background -->
  <rect width="512" height="512" rx="64" ry="64" fill="url(#grad)" filter="url(#shadow)"/>

  <!-- White 'H' centered -->
  <g transform="translate(256,256)">
    <text x="0" y="26" text-anchor="middle" dominant-baseline="middle" font-family="Segoe UI, Roboto, Helvetica, Arial, sans-serif" font-weight="700" font-size="220" fill="#ffffff">H</text>
  </g>

  <!-- Optional subtle inner highlight -->
  <rect x="32" y="32" width="448" height="448" rx="56" ry="56" fill="none" stroke="#ffffff" stroke-opacity="0.03"/>
</svg>
