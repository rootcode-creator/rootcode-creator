<svg width="300" height="165" viewBox="0 0 300 165" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="descId">
  <title id="titleId"></title>
  <desc id="descId"></desc>
  <defs>
    <linearGradient id="card-bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f8f9ff;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="title-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000000" flood-opacity="0.08" />
    </filter>
  </defs>
  <style>
    .header { font: 600 18px 'Segoe UI', Ubuntu, Sans-Serif; fill: url(#title-grad); animation: fadeInAnimation 0.8s ease-in-out forwards; }
    .stat { font: 600 14px 'Segoe UI', Ubuntu, Sans-Serif; fill: #475569; }
    .lang-name { font: 400 11px "Segoe UI", Ubuntu, Sans-Serif; fill: #475569; }
    .stagger { opacity: 0; animation: fadeInAnimation 0.3s ease-in-out forwards; }
    @keyframes fadeInAnimation { from { opacity: 0; } to { opacity: 1; } }
  </style>
  <rect data-testid="card-bg" x="0.5" y="0.5" rx="12" height="99%" stroke="#e5e7eb" width="299" fill="url(#card-bg-grad)" stroke-opacity="1" filter="url(#shadow)" />
  <g data-testid="card-title" transform="translate(25, 35)">
    <text x="0" y="0" class="header" data-testid="header">Top Languages</text>
  </g>
  <g data-testid="main-card-body" transform="translate(0, 55)">
    <svg data-testid="lang-items" x="25">
      <mask id="rect-mask"><rect x="0" y="0" width="250" height="8" fill="white" rx="5"/></mask>
      <rect mask="url(#rect-mask)" x="0" y="0" width="211.04" height="8" fill="#f59e0b" />
      <rect mask="url(#rect-mask)" x="211.04" y="0" width="37.32" height="8" fill="#f97316" />
      <rect mask="url(#rect-mask)" x="248.36" y="0" width="10.57" height="8" fill="#3b82f6" />
      <rect mask="url(#rect-mask)" x="248.93" y="0" width="10.47" height="8" fill="#14b8a6" />
      <rect mask="url(#rect-mask)" x="249.40" y="0" width="10.35" height="8" fill="#a855f7" />
      <rect mask="url(#rect-mask)" x="249.75" y="0" width="10.24" height="8" fill="#64748b" />
      <g transform="translate(0, 25)"><g class="stagger" style="animation-delay: 450ms"><circle cx="5" cy="6" r="5" fill="#f59e0b" /><text x="15" y="10" class="lang-name">Jupyter Notebook · 84.42%</text></g><g transform="translate(0, 25)" class="stagger" style="animation-delay: 600ms"><circle cx="5" cy="6" r="5" fill="#f97316" /><text x="15" y="10" class="lang-name">HTML · 14.93%</text></g><g transform="translate(0, 50)" class="stagger" style="animation-delay: 750ms"><circle cx="5" cy="6" r="5" fill="#3b82f6" /><text x="15" y="10" class="lang-name">TypeScript · 0.23%</text></g></g>
      <g transform="translate(150, 0)"><g class="stagger" style="animation-delay: 450ms"><circle cx="5" cy="6" r="5" fill="#14b8a6" /><text x="15" y="10" class="lang-name">Python · 0.19%</text></g><g transform="translate(0, 25)" class="stagger" style="animation-delay: 600ms"><circle cx="5" cy="6" r="5" fill="#a855f7" /><text x="15" y="10" class="lang-name">Java · 0.14%</text></g><g transform="translate(0, 50)" class="stagger" style="animation-delay: 750ms"><circle cx="5" cy="6" r="5" fill="#64748b" /><text x="15" y="10" class="lang-name">PHP · 0.10%</text></g></g>
    </svg>
  </g>
</svg>
